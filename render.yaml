services:
  - type: web
    name: secure-file-transfer-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PROVIDER
        value: postgres
      - key: FILE_STORAGE_PROVIDER
        value: supabase
      - key: SUPABASE_STORAGE_BUCKET
        value: encrypted-files
      - key: MAX_UPLOAD_BYTES
        value: 1073741824
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: CLIENT_ORIGINS
        value: https://file-sharing-using-blockchain.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: OTP_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
